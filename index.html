<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <meta name="theme-color" content="#2c3e50">
    <meta name="apple-mobile-web-app-title" content="AquaMap">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no, date=no, email=no, address=no">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaMap</title>
</head>

<body>
    <div id="offline-banner" class="hidden">Jesteś offline — wyświetlane dane mogą być nieaktualne.</div>
    <div id="header">
        <h1>AquaMap</h1>
    </div>
    <div id="content">
        <div id="sidebar">
            <div id="list-view">
                <h2 class="list-title">Baseny</h2>
                <div class="search-wrap">
                    <span class="search-icon" aria-hidden="true">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </span>
                    <input type="text" id="search-input" placeholder="Szukaj basenu...">
                </div>
                <label class="toggle">
                    <input type="checkbox" id="open-now-checkbox">
                    <span class="toggle-track"><span class="toggle-thumb"></span></span>
                    <span class="toggle-label">Tylko otwarte teraz</span>
                </label>
                <ul id="places-list">
                    <li class="places-info">Ładowanie danych…</li>
                </ul>
            </div>
            <div id="details-view" class="hidden">
                <button id="back-button">&larr; Wstecz</button>
                <div id="details-content">
                </div>
            </div>
        </div>
        <div id="map"></div>
    </div>
    <!-- scripts -->
    <script type="module" src="/js/app.js"></script>
</body>

</html>
